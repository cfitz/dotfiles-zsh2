# Starship prompt configuration
# https://starship.rs/config/

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "✖"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[python]
symbol = " "
detect_files = ["*.py", ".python-version", "pyproject.toml", "requirements.txt"]

[nodejs]
symbol = " "
detect_files = ["package.json", ".node-version"]

[rust]
symbol = " "

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[hostname]
ssh_only = true
format = "[$hostname](bold green) "

[username]
show_always = false
format = "[$user](bold blue)@"
