# Prefix key configuration
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Modern tmux settings
set -s escape-time 0              # eliminate Esc delay
set -g mouse on                   # enable mouse support
set -g base-index 1               # start windows at 1, not 0
setw -g pane-base-index 1         # start panes at 1
set -g renumber-windows on        # auto-renumber windows
set -g status-interval 1          # update status every 1s

# XDG Base Directory compliance
set -g history-file "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/history"

# 256 color terminal support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*-256color:RGB"

# Modern status line styling
set -g status-style 'fg=#e4e4e4 bg=#3a3a3a'
set -g window-status-current-style 'fg=#ffff00 bg=#3a3a3a bold'
set -g window-status-style 'fg=#e4e4e4 bg=#3a3a3a'
set -g pane-border-style 'fg=#4a4a4a'
set -g pane-active-border-style 'fg=#ffff00'
set -g message-style 'fg=#ffff00 bg=#3a3a3a'

# Status bar layout
set -g status-left ' #[bold]#S#[nobold] '
set -g status-right '%a %b %d %H:%M'

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off

# VI mode in copy mode
setw -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Reload configuration
bind r source-file ~/.tmux.conf \; display "✓ Config reloaded"

# Window navigation with vim keybindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r o select-pane -t :.+

# Pane resizing with vim keybindings
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind -r n next-window
bind -r p previous-window
